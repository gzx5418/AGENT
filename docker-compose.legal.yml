# 法律AI专家系统 - Docker Compose配置
# 包含：智谱API转换桥 + Poco框架

services:
  # 智谱API转换桥
  zhipu-bridge:
    build:
      context: ./api-bridge
      dockerfile: Dockerfile
    container_name: zhipu-bridge
    ports:
      - "8080:8080"
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
    networks:
      - legal-network

  # Poco Backend
  backend:
    extends:
      file: ./poco-claw-main/docker-compose.yml
      service: backend
    environment:
      - ANTHROPIC_API_KEY=${ZHIPU_API_KEY}
      - ANTHROPIC_BASE_URL=http://zhipu-bridge:8080/v1
      - DEFAULT_MODEL=claude-3-5-sonnet-20241022
    depends_on:
      - zhipu-bridge
    networks:
      - legal-network

  # Poco Frontend
  frontend:
    extends:
      file: ./poco-claw-main/docker-compose.yml
      service: frontend
    depends_on:
      - backend
    networks:
      - legal-network

  # Poco Executor Manager
  executor-manager:
    extends:
      file: ./poco-claw-main/docker-compose.yml
      service: executor-manager
    environment:
      - ANTHROPIC_API_KEY=${ZHIPU_API_KEY}
      - ANTHROPIC_BASE_URL=http://zhipu-bridge:8080/v1
    depends_on:
      - zhipu-bridge
      - backend
    networks:
      - legal-network

  # Poco Executor
  executor:
    extends:
      file: ./poco-claw-main/docker-compose.yml
      service: executor
    environment:
      - ANTHROPIC_API_KEY=${ZHIPU_API_KEY}
      - ANTHROPIC_BASE_URL=http://zhipu-bridge:8080/v1
    depends_on:
      - zhipu-bridge
      - executor-manager
    networks:
      - legal-network

networks:
  legal-network:
    driver: bridge
