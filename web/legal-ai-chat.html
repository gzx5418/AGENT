<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律AI专家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a56db;
            --primary-dark: #1e40af;
            --bg: #f8fafc;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .header {
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
        }

        .header-subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        .settings-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 消息区 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 14px;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-content {
            white-space: pre-wrap;
        }

        .message-content b {
            color: var(--primary);
        }

        /* 引用卡片 */
        .reference-card {
            background: white;
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 12px 0;
            font-size: 13px;
        }

        .reference-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .reference-meta {
            font-size: 11px;
            color: var(--text-light);
        }

        .reference-content {
            margin-top: 8px;
            color: var(--text);
            line-height: 1.6;
        }

        /* 思考过程 */
        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #fef3c7;
            border-radius: 8px;
            font-size: 13px;
            color: #92400e;
            margin-bottom: 12px;
        }

        .thinking-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #f59e0b;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 加载动画 */
        .typing {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* 输入区 */
        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--bg);
        }

        .input-wrapper {
            flex: 1;
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        textarea {
            width: 100%;
            padding: 12px 14px;
            border: none;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            background: transparent;
        }

        textarea:focus {
            outline: none;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(26, 86, 219, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            transition: right 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .settings-title {
            font-size: 18px;
            font-weight: 600;
        }

        .settings-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
        }

        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .settings-section {
            margin-bottom: 24px;
        }

        .settings-section-title {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .settings-item {
            margin-bottom: 16px;
        }

        .settings-item label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--text);
        }

        .settings-item input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }

        .settings-item input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.open {
            display: block;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .settings-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="logo">法</div>
                <div>
                    <div class="header-title">法律AI专家</div>
                    <div class="header-subtitle">智能法律咨询助手</div>
                </div>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️ 设置</button>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-content">
                    👋 您好！我是法律AI专家，可以帮您：

                    • <b>解答法律问题</b> - 分析法律风险，提供专业建议
                    • <b>检索法律法规</b> - 查找相关法条和规定
                    • <b>搜索司法案例</b> - 参考类似判例
                    • <b>审查合同文书</b> - 识别风险条款

                    请直接输入您的法律问题，我会自动检索相关资料并给出专业分析。
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" rows="2" placeholder="输入您的法律问题，如：上班途中发生车祸算工伤吗？" onkeydown="handleKeyDown(event)"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="overlay" id="overlay" onclick="toggleSettings()"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <div class="settings-title">⚙️ 设置</div>
            <button class="settings-close" onclick="toggleSettings()">×</button>
        </div>
        <div class="settings-content">
            <div class="settings-section">
                <div class="settings-section-title">智谱AI配置</div>
                <div class="settings-item">
                    <label>API Key</label>
                    <input type="password" id="zhipuKey" placeholder="输入智谱API Key">
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-section-title">得理法律API（已预配置）</div>
                <div class="settings-item">
                    <label>AppID</label>
                    <input type="text" id="delilegalAppid" value="QthdBErlyaYvyXul">
                </div>
                <div class="settings-item">
                    <label>Secret</label>
                    <input type="password" id="delilegalSecret" value="EC5D455E6BD348CE8E18BE05926D2EBE">
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-section-title">功能开关</div>
                <div class="settings-item">
                    <label>
                        <input type="checkbox" id="autoSearch" checked>
                        自动检索法规和案例
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            zhipu: {
                baseUrl: 'https://open.bigmodel.cn/api/anthropic',
                apiKey: ''
            },
            delilegal: {
                baseUrl: 'https://openapi.delilegal.com/api/qa/v3/search',
                appid: 'QthdBErlyaYvyXul',
                secret: 'EC5D455E6BD348CE8E18BE05926D2EBE'
            }
        };

        let isLoading = false;

        // 切换设置面板
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        // 添加消息
        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="message-content">${formatContent(content)}</div>`;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return messageDiv;
        }

        // 格式化内容
        function formatContent(content) {
            return content
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
                .replace(/\n/g, '<br>');
        }

        // 添加思考提示
        function addThinking(text) {
            const chatArea = document.getElementById('chatArea');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'thinking';
            thinkingDiv.id = 'thinkingIndicator';
            thinkingDiv.innerHTML = `
                <div class="thinking-spinner"></div>
                <span>${text}</span>
            `;
            chatArea.appendChild(thinkingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 更新思考提示
        function updateThinking(text) {
            const thinkingDiv = document.getElementById('thinkingIndicator');
            if (thinkingDiv) {
                thinkingDiv.querySelector('span').textContent = text;
            }
        }

        // 移除思考提示
        function removeThinking() {
            const thinkingDiv = document.getElementById('thinkingIndicator');
            if (thinkingDiv) thinkingDiv.remove();
        }

        // 添加加载动画
        function addTyping() {
            const chatArea = document.getElementById('chatArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 移除加载动画
        function removeTyping() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) typingDiv.remove();
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || isLoading) return;

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            input.value = '';

            addMessage('user', message);
            addTyping();

            try {
                const autoSearch = document.getElementById('autoSearch').checked;
                let context = '';
                let references = [];

                // 自动检索法规和案例
                if (autoSearch) {
                    removeTyping();
                    addThinking('正在检索相关法规...');

                    // 提取关键词
                    const keywords = extractKeywords(message);

                    // 检索法规
                    const lawResults = await searchLaw(keywords);
                    if (lawResults.length > 0) {
                        updateThinking('正在检索相关案例...');
                        references = references.concat(lawResults.map(r => ({...r, type: 'law'})));
                        context += '\n\n【相关法规】\n' + lawResults.map(r =>
                            `• ${r.title}${r.content ? `：${r.content.substring(0, 200)}...` : ''}`
                        ).join('\n');
                    }

                    // 检索案例
                    const caseResults = await searchCase(keywords);
                    if (caseResults.length > 0) {
                        references = references.concat(caseResults.map(r => ({...r, type: 'case'})));
                        context += '\n\n【相关案例】\n' + caseResults.map(r =>
                            `• ${r.title || r.caseName}（${r.courtName || ''}，${r.judgeDate || ''}）`
                        ).join('\n');
                    }

                    removeThinking();
                    addTyping();
                }

                // 调用AI生成回答
                const aiResponse = await getAIResponse(message, context);

                removeTyping();

                // 构建完整回复
                let fullResponse = aiResponse;

                // 添加引用卡片
                if (references.length > 0) {
                    fullResponse += '\n\n---\n**📚 参考资料**';
                }

                const msgDiv = addMessage('assistant', fullResponse);

                // 添加引用详情
                if (references.length > 0) {
                    const refContainer = document.createElement('div');
                    refContainer.style.marginTop = '12px';

                    references.slice(0, 6).forEach(ref => {
                        const card = document.createElement('div');
                        card.className = 'reference-card';
                        card.innerHTML = `
                            <div class="reference-title">${ref.type === 'law' ? '📜' : '⚖️'} ${ref.title || ref.caseName}</div>
                            <div class="reference-meta">
                                ${ref.type === 'law'
                                    ? `${ref.levelName || ''} | ${ref.timelinessName || ''} | ${ref.publishDate || ''}`
                                    : `${ref.courtName || ''} | ${ref.judgeDate || ''} | ${ref.caseType || ''}`}
                            </div>
                        `;
                        refContainer.appendChild(card);
                    });

                    msgDiv.querySelector('.message-content').appendChild(refContainer);
                }

            } catch (error) {
                removeTyping();
                removeThinking();
                addMessage('assistant', `❌ 错误: ${error.message}`);
            }

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }

        // 提取关键词
        function extractKeywords(text) {
            // 法律领域关键词
            const legalKeywords = [
                '工伤', '劳动', '工资', '加班', '解雇', '辞退', '离职', '社保',
                '合同', '违约', '解除', '定金', '赔偿', '条款',
                '婚姻', '离婚', '抚养', '赡养', '财产分割',
                '房产', '房屋', '租房', '买卖', '产权',
                '债务', '借贷', '欠款', '利息', '担保',
                '交通', '事故', '肇事', '保险',
                '医疗', '纠纷', '损害', '侵权',
                '刑事', '犯罪', '刑罚', '辩护',
                '行政', '处罚', '复议', '诉讼'
            ];

            const keywords = [];
            legalKeywords.forEach(kw => {
                if (text.includes(kw) && !keywords.includes(kw)) {
                    keywords.push(kw);
                }
            });

            // 如果没有提取到关键词，使用分词
            if (keywords.length === 0) {
                const words = text.match(/[\u4e00-\u9fa5]{2,4}/g) || [];
                keywords.push(...words.slice(0, 3));
            }

            return keywords.length > 0 ? keywords : [text.substring(0, 10)];
        }

        // 检索法规
        async function searchLaw(keywords) {
            try {
                const response = await fetch(`${CONFIG.delilegal.baseUrl}/queryListLaw`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'appid': document.getElementById('delilegalAppid').value,
                        'secret': document.getElementById('delilegalSecret').value
                    },
                    body: JSON.stringify({
                        pageNo: 1,
                        pageSize: 3,
                        sortField: 'correlation',
                        sortOrder: 'desc',
                        condition: {
                            timeLinessTypeArr: ['5'],
                            publishYearStart: '1978-01-01',
                            publishYearEnd: '2026-01-01',
                            activeYearStart: '1978-01-01',
                            activeYearEnd: '2026-01-01',
                            keywords: keywords,
                            fieldName: 'semantic'
                        }
                    })
                });

                const data = await response.json();
                return data.success && data.body ? data.body.data : [];
            } catch (e) {
                console.error('法规检索失败:', e);
                return [];
            }
        }

        // 检索案例
        async function searchCase(keywords) {
            try {
                const response = await fetch(`${CONFIG.delilegal.baseUrl}/queryListCase`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'appid': document.getElementById('delilegalAppid').value,
                        'secret': document.getElementById('delilegalSecret').value
                    },
                    body: JSON.stringify({
                        pageNo: 1,
                        pageSize: 3,
                        sortField: 'correlation',
                        sortOrder: 'desc',
                        condition: {
                            timeLinessTypeArr: ['5'],
                            publishYearStart: '1978-01-01',
                            publishYearEnd: '2026-01-01',
                            activeYearStart: '1978-01-01',
                            activeYearEnd: '2026-01-01',
                            keywordArr: keywords
                        }
                    })
                });

                const data = await response.json();
                return data.success && data.body ? data.body.data : [];
            } catch (e) {
                console.error('案例检索失败:', e);
                return [];
            }
        }

        // 调用AI
        async function getAIResponse(question, context) {
            const apiKey = document.getElementById('zhipuKey').value || CONFIG.zhipu.apiKey;

            if (!apiKey) {
                throw new Error('请先在设置中配置智谱API Key');
            }

            const systemPrompt = `你是一位专业的中国法律顾问。请基于以下原则回答问题：

1. **专业准确**：引用具体法条，说明法律依据
2. **结构清晰**：使用分点说明，逻辑清晰
3. **实用可行**：给出具体操作建议
4. **风险提示**：提醒可能的法律风险

${context ? `以下是检索到的相关资料供参考：${context}` : ''}

请用专业但易懂的语言回答用户的法律问题。`;

            const response = await fetch(`${CONFIG.zhipu.baseUrl}/v1/messages`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'glm-5',
                    max_tokens: 2048,
                    system: systemPrompt,
                    messages: [{
                        role: 'user',
                        content: question
                    }]
                })
            });

            if (!response.ok) {
                const error = await response.text();
                throw new Error(`API错误: ${error}`);
            }

            const data = await response.json();
            return data.content[0].text;
        }

        // 键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 页面加载时检查配置
        window.onload = function() {
            const savedKey = localStorage.getItem('zhipuKey');
            if (savedKey) {
                document.getElementById('zhipuKey').value = savedKey;
            }

            // 保存配置
            document.getElementById('zhipuKey').addEventListener('change', function() {
                localStorage.setItem('zhipuKey', this.value);
            });
        };
    </script>
</body>
</html>
